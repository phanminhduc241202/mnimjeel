<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIMJEEL - Map</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/restaurant.css">
    <style>
        #map-container { width: 100%; height: 80vh; margin-top: 6rem; }
        .map-sidebar { position: fixed; left: 0; top: 6rem; width: 30%; height: calc(100vh - 6rem); background: #fff; overflow-y: auto; z-index: 900; padding: 1rem; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        @media (max-width: 1000px) { .map-sidebar { width: 50%; } #map-container { margin-left: 50%; } }
        @media (max-width: 768px) { .map-sidebar { display: none; } #map-container { margin-left: 0; } }
    </style>
</head>
<body>
    <div id="top"></div>
    <header class="header">
        <a href="index.html" class="logo"><i class="fas fa-utensils"></i> <span style="color: #ADD8E6;">MNIM</span><span style="color: #E950B8;">JEEL</span></a>
        <nav class="navbar">
            <div id="nav-close" class="fas fa-times"></div>
            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="map.html">Map</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About Us</a>
        </nav>
        <div class="icons">
            <div id="menu-btn" class="fas fa-bars"></div>
        </div>
    </header>  

    <div class="map-sidebar">
        <h3>Danh Sách Quán</h3>
        <input type="text" id="map-search" placeholder="Tìm kiếm..." style="width: 100%; padding: 0.5rem; margin: 1rem 0; border: 1px solid #ddd;">
        <div id="restaurants-list"></div>
    </div>

    <div id="map-container"></div>

    <footer class="footer">
        <div class="footer-content">
            <div><h4>About Us</h4><p><span style="color: #ADD8E6;">MNIM</span><span style="color: #E950B8;">JEEL</span> HCMC - Tìm kiếm quán ăn tốt nhất.</p></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <span style="color: #ADD8E6;">MNIM</span><span style="color: #E950B8;">JEEL</span> HCMC</p></div>
    </footer>

    <a href="#top" class="to-top"><i class="fas fa-chevron-up"></i></a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.1/dist/MarkerCluster.css" />
    <script src="js/script.js"></script>

    <script>
        let restaurantsData = null;
        let map = null;
        let markers = [];

        async function loadData() {
            const res = await fetch('data/restaurants.json');
            restaurantsData = await res.json();
            initMap();
            loadRestaurantsList();
        }

        function initMap() {
            map = L.map('map-container').setView([10.7769, 106.7009], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OpenStreetMap'}).addTo(map);

            const markerGroup = L.markerClusterGroup();

            restaurantsData.restaurants.forEach(r => {
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${r.latitude},${r.longitude}&travelmode=driving`;
                const marker = L.marker([r.latitude, r.longitude])
                    .bindPopup(`<strong>${r.name}</strong><br>${r.district}<br><a href="detail.html?id=${r.id}" class="btn btn-primary" style="display: inline-block; margin-top: 0.5rem;">Chi Tiết</a><br><a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary" style="display: inline-block; margin-top: 0.5rem;">Chỉ Đường</a>`)
                    .on('click', () => {
                        document.getElementById('map-search').value = r.name;
                        filterRestaurants();
                    });
                markerGroup.addLayer(marker);
                markers.push({marker, restaurant: r});
            });

            map.addLayer(markerGroup);
        }

        function loadRestaurantsList() {
            const list = document.getElementById('restaurants-list');
            list.innerHTML = restaurantsData.restaurants.map(r => `
                <div class="card p-1 mb-1" style="cursor: pointer;" onclick="goToRestaurant(${r.id})">
                    <h4 style="margin: 0 0 0.3rem; font-size: 1.3rem;">${r.name}</h4>
                    <p style="margin: 0; font-size: 1.2rem; color: #666;">${r.district} - ${r.category}</p>
                </div>
            `).join('');

            document.getElementById('map-search').addEventListener('keyup', filterRestaurants);
        }

        function filterRestaurants() {
            const search = document.getElementById('map-search').value.toLowerCase();
            document.querySelectorAll('#restaurants-list .card').forEach(el => {
                el.style.display = el.textContent.toLowerCase().includes(search) ? '' : 'none';
            });
        }

        function goToRestaurant(id) {
            const r = restaurantsData.restaurants.find(x => x.id === id);
            if (r) map.setView([r.latitude, r.longitude], 16);
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
